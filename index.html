<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EliteStars Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            padding: 20px;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        button {
            background-color: var(--tg-theme-button-color, #248bed);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="welcome-msg">مرحباً بك في EliteStars!</h1>
        <p>هذا هو تطبيق الويب الخاص بك داخل تلغرام.</p>
        <button id="main-btn">إغلاق التطبيق</button>
    </div>

    <script>
        // تهيئة تطبيق الويب
        const tg = window.Telegram.WebApp;
        tg.expand(); // توسيع التطبيق لملء الشاشة

        // عرض اسم المستخدم إذا كان متاحاً
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('welcome-msg').innerText = `مرحباً يا ${user.first_name}!`;
        }

        // برمجة زر الإغلاق
        document.getElementById('main-btn').addEventListener('click', () => {
            tg.close();
        });
    </script>
</body>
</html>
